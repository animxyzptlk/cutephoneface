<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reactive Face v2</title>

<style>
body {
  margin: 0;
  background: #b9c8d6;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* FACE */
.face {
  position: relative;
  width: 300px;
  height: 300px;
}

/* EYES */
.eye {
  position: absolute;
  width: 70px;
  height: 90px;
  background: #111;
  border-radius: 35px;
  top: 120px;
  transition: all 0.3s ease;
}

.left-eye { left: 40px; }
.right-eye { right: 40px; }

.pupil {
  position: absolute;
  width: 50px;
  height: 60px;
  background: #3c4cff;
  border-radius: 25px;
  bottom: 5px;
  left: 10px;
}

/* EYEBROWS */
.brow {
  position: absolute;
  width: 80px;
  height: 12px;
  background: #111;
  top: 70px;
  transition: all 0.3s ease;
}

.left-brow { left: 30px; transform: rotate(-10deg); }
.right-brow { right: 30px; transform: rotate(10deg); }

/* MOUTH */
.mouth {
  position: absolute;
  width: 60px;
  height: 20px;
  background: #111;
  bottom: 40px;
  left: 120px;
  border-radius: 20px;
  transition: all 0.3s ease;
}

/* STATES */

/* SLOW */
.slow .eye {
  height: 20px;
}

.slow .brow {
  top: 90px;
}

.slow .mouth {
  height: 10px;
}

/* FAST */
.fast .eye {
  height: 120px;
}

.fast .brow {
  top: 40px;
}

.fast .mouth {
  height: 40px;
}

/* FASTER */
.faster .eye {
  height: 5px;
}

.faster .brow {
  top: 95px;
}

.faster .mouth {
  height: 70px;
}

</style>
</head>

<body>

<div class="face slow" id="face">
  <div class="brow left-brow"></div>
  <div class="brow right-brow"></div>

  <div class="eye left-eye"><div class="pupil"></div></div>
  <div class="eye right-eye"><div class="pupil"></div></div>

  <div class="mouth"></div>
</div>

<script>
// AUDIO SETUP
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let oscillator = audioCtx.createOscillator();
let gain = audioCtx.createGain();

oscillator.type = "sine";
oscillator.connect(gain);
gain.connect(audioCtx.destination);
oscillator.start();

// smoothing
let smoothedSpeed = 0;

function updateAudio(level) {
  if (level === "slow") {
    oscillator.frequency.value = 180;
    gain.gain.value = 0.02;
  }
  if (level === "fast") {
    oscillator.frequency.value = 400;
    gain.gain.value = 0.05;
  }
  if (level === "faster") {
    oscillator.frequency.value = 800;
    gain.gain.value = 0.1;
  }
}

// FACE CONTROL
const face = document.getElementById("face");

function setState(state) {
  face.classList.remove("slow", "fast", "faster");
  face.classList.add(state);
  updateAudio(state);
}

// MOTION
function startMotion() {
  window.addEventListener("devicemotion", (event) => {
    let acc = event.accelerationIncludingGravity;

    let speed = Math.sqrt(
      acc.x * acc.x +
      acc.y * acc.y +
      acc.z * acc.z
    );

    // smooth values to reduce jitter
    smoothedSpeed = smoothedSpeed * 0.8 + speed * 0.2;

    // thresholds (tweakable)
    if (smoothedSpeed < 8) {
      setState("slow");
    } else if (smoothedSpeed < 18) {
      setState("fast");
    } else {
      setState("faster");
    }
  });
}

// iOS permission
if (typeof DeviceMotionEvent.requestPermission === "function") {
  document.body.addEventListener("click", () => {
    DeviceMotionEvent.requestPermission().then(res => {
      if (res === "granted") startMotion();
    });
    audioCtx.resume();
  });
} else {
  startMotion();
}

</script>

</body>
</html>
