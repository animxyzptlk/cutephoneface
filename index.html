<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reactive Face v3</title>

<style>
body {
  margin: 0;
  background: #b9c8d6;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* FACE */
.face {
  position: relative;
  width: 300px;
  height: 300px;
}

/* EYES */
.eye {
  position: absolute;
  width: 70px;
  height: 90px;
  background: #111;
  border-radius: 35px;
  top: 120px;
  overflow: hidden;
  transition: all 0.3s ease;
}

.left-eye { left: 40px; }
.right-eye { right: 40px; }

/* PUPILS (70% size, always proportional) */
.pupil {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #3c4cff;
  border-radius: 50%;
  transform: scale(0.7);
  transform-origin: center;
}

/* EYEBROWS */
.brow {
  position: absolute;
  width: 80px;
  height: 12px;
  background: #111;
  top: 70px;
  transition: all 0.3s ease;
}

.left-brow { left: 30px; transform: rotate(-10deg); }
.right-brow { right: 30px; transform: rotate(10deg); }

/* MOUTH */
.mouth {
  position: absolute;
  width: 60px;
  height: 20px;
  background: #111;
  bottom: 40px;
  left: 120px;
  border-radius: 20px;
  transition: all 0.3s ease;
}

/* STATES */

/* SLOW */
.slow .eye {
  height: 20px;
}
.slow .brow {
  top: 90px;
}
.slow .mouth {
  height: 10px;
}

/* FAST */
.fast .eye {
  height: 120px;
}
.fast .brow {
  top: 40px;
}
.fast .mouth {
  height: 40px;
}

/* FASTER */
.faster .eye {
  height: 5px;
}
.faster .brow {
  top: 95px;
}
.faster .mouth {
  height: 70px;
}

</style>
</head>

<body>

<div class="face slow" id="face">
  <div class="brow left-brow"></div>
  <div class="brow right-brow"></div>

  <div class="eye left-eye"><div class="pupil"></div></div>
  <div class="eye right-eye"><div class="pupil"></div></div>

  <div class="mouth"></div>
</div>

<script>
// AUDIO SETUP (8-bit style beeps)
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();

osc.type = "square"; // 8-bit sound
osc.connect(gain);
gain.connect(audioCtx.destination);

gain.gain.value = 0;
osc.start();

// BEEP LOOP
let beepInterval;

function startBeeping(speedLevel) {
  clearInterval(beepInterval);

  let intervalTime;
  let freq;

  if (speedLevel === "slow") {
    intervalTime = 600;
    freq = 220;
  } else if (speedLevel === "fast") {
    intervalTime = 300;
    freq = 440;
  } else {
    intervalTime = 120;
    freq = 880;
  }

  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

  beepInterval = setInterval(() => {
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  }, intervalTime);
}

// FACE CONTROL
const face = document.getElementById("face");
let currentState = "slow";

function setState(state) {
  if (state === currentState) return;

  currentState = state;
  face.classList.remove("slow", "fast", "faster");
  face.classList.add(state);

  startBeeping(state);
}

// MOTION
let smoothedSpeed = 0;

function startMotion() {
  window.addEventListener("devicemotion", (event) => {
    let acc = event.accelerationIncludingGravity;

    let speed = Math.sqrt(
      acc.x * acc.x +
      acc.y * acc.y +
      acc.z * acc.z
    );

    // smoothing
    smoothedSpeed = smoothedSpeed * 0.8 + speed * 0.2;

    if (smoothedSpeed < 8) {
      setState("slow");
    } else if (smoothedSpeed < 18) {
      setState("fast");
    } else {
      setState("faster");
    }
  });
}

// iOS permission
if (typeof DeviceMotionEvent.requestPermission === "function") {
  document.body.addEventListener("click", () => {
    DeviceMotionEvent.requestPermission().then(res => {
      if (res === "granted") startMotion();
    });
    audioCtx.resume();
    startBeeping("slow");
  });
} else {
  startMotion();
  startBeeping("slow");
}

</script>

</body>
</html>
